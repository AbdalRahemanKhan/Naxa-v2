[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://fonts.gstatic.com https://api.groq.com https://api.currentsapi.services https://gamma-api.polymarket.com; connect-src *; img-src * data:"
    X-Frame-Options = "SAMEORIGIN"
