name: NAXA Intelligence Pipeline

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:         # Manual trigger from Actions tab

jobs:
  run-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: naxa-pipeline
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Create directories
        run: mkdir -p data frontend

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/
          key: naxa-data-${{ github.run_number }}
          restore-keys: naxa-data-

      - name: Run Scrapyard
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CURRENTS_API_KEY: ${{ secrets.CURRENTS_API_KEY }}
        run: python backend/agents/scrapyard.py

      - name: Run Signal Filter
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python backend/agents/signal_filter.py

      - name: Run Analyzer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python backend/agents/analyzer.py

      - name: Run Betting System
        run: python backend/agents/betting.py

      - name: Run Evolution (weekly on Sundays)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule')
        run: |
          DAY=$(date +%u)
          if [ "$DAY" = "7" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python backend/agents/evolution.py
          else
            echo "Skipping evolution — runs Sundays only"
          fi

      - name: Commit updated signals
        run: |
          git config --local user.email "naxa-agents@github.actions"
          git config --local user.name "NAXA Agents"
          git add frontend/signals_cache.json frontend/performance.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            COUNT=$(python3 -c "import json; d=json.load(open('frontend/signals_cache.json')); print(d['count'])" 2>/dev/null || echo "?")
            git commit -m "agents: ${COUNT} insights @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Save data cache
        uses: actions/cache@v4
        if: always()
        with:
          path: data/
          key: naxa-data-${{ github.run_number }}
